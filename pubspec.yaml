name: kawaii_ui
description: >
  A glossy, tactile, kawaii-skeuomorphic Flutter UI library. Every element
  has physical mass, volume, and surface response — like candy, polished
  toys, or macarons.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
